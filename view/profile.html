<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile - NatureX</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-[#E9F0C9] font-sans">
    <div class="flex min-h-screen">
      
      <!-- Sidebar -->
      <aside class="w-64 bg-[#E9F0C9] border-r border-black/20 flex flex-col">
        <!-- Logo -->
        <img src="/aset/nature-removebg-preview.png" class="w-90 mx-auto mb-4">
        <div class="w-screen border-b border-gray-400"></div>

        <!-- Menu -->
        <nav class="flex flex-col gap-4 px-6 mt-6">
          <a href="/homepage.html" class="flex items-center gap-3 text-black">
            <img
              src="https://cdn-icons-png.flaticon.com/128/1946/1946488.png"
              class="w-5 h-5"
            />
            <span>Home</span>
          </a>

          <a href="#" class="flex items-center gap-3 text-black">
            <img src="https://cdn-icons-png.flaticon.com/128/182/182321.png" class="w-5 h-5">
            <span>Materi</span>
          </a>

          <a href="#" class="flex items-center gap-3 text-black">
            <img src="https://cdn-icons-png.flaticon.com/128/9920/9920947.png" class="w-5 h-5">
            <span>Artikel</span>
          </a>

          <a href="#" class="flex items-center gap-3 text-black">
            <img src="https://cdn-icons-png.flaticon.com/128/3602/3602145.png" class="w-5 h-5">
            <span>Notification</span>
          </a>

          <div class="flex flex-col gap-6 px-6 mt-4 text-gray-800">
          <div class="flex items-center gap-3 bg-green-500 text-black px-3 py-2 rounded">

            <img src="https://cdn-icons-png.flaticon.com/128/456/456283.png" class="w-5 h-5">
            <span>Profile</span>
          </a>
          </div>

        <a href="#" class="flex items-center gap-3 text-black">
            <img src="https://cdn-icons-png.flaticon.com/128/2040/2040504.png" class="w-5 h-5">
            <span>Settings</span>
          </a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 p-16">
        <h1 class="text-3xl font-semibold mb-10 mt-20">Profile</h1>

        <div class="flex items-center gap-10">
          <!-- Profile Image -->
          <img
            src="/aset/photo_6248746660984983040_y.jpg"
            class="w-40 h-40 rounded-full object-cover"
          />

          <!-- Info -->
          <div>
            <h2 class="text-3xl font-semibold">Alexander Halim</h2>
            <p class="text-gray-600 mt-1">AlexanderHalim@gmail.com</p>
          </div>
        </div>

        <!-- Description -->
        <p class="text-gray-500 ml-40 mt-10">
          Tambahkan deskripsi tentang diri Anda.
        </p>

        <!-- Button -->
        <button
          class="mt-6 mx-auto block items-center bg-green-500 hover:bg-green-600 text-black px-6 py-2 rounded"
        >
          Edit profile
        </button>
      </main>
    </div>
  </body>
</html>
