<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen w-full bg-[#EFF5D2 ]">

  <div class="flex items-center justify-between h-screen pl-40 pr-60 bg-[#EFF5D2]">
    
    <!-- KIRI -->
    <div>
      <h1 class="text-5xl font-semibold">Login</h1>
    </div>

    <!-- KANAN (FORM) -->
    <div class="w-96">
      
      <!-- Username -->
      <label class="block mb-2 text-sm">Username</label>
      <input type="text" class="w-full p-3 border border-green-600 rounded-md bg-transparent mb-6 outline-none">

      <!-- Password -->
      <label class="block mb-2 text-sm">Password</label>
      <div class="relative">
        <input id="password" type="password" class="w-full p-3 border border-green-600 rounded-md bg-transparent outline-none">
        
        <!-- ICON MATA -->
        <button type="button" onclick="togglePassword()" class="absolute right-3 top-3">
          <img src="https://cdn-icons-png.flaticon.com/128/709/709612.png" class="w-5 h-5" id="eyeIcon">
        </button>
      </div>

      <p class="text-sm mt-2 mb-6">
  <a href="forgot.html" class="hover:underline">
    Forget Password?
  </a>
</p>

       
      <a href="./homepage.html" 
       class="bg-green-500 px-6 py-2 rounded inline-block
          active:scale-95 transition">
          send
        </a>

      <!-- Register -->
      <p class="text-sm text-center">
        don't have an account yet 
        <a href="register.html">
          <span class="font-semibold">Register</span>
        </a>
      </p>

      <!-- ICON SOSIAL (TENGAH) -->
      <div class="flex justify-center gap-6 mt-4 text-lg">
        <span class="cursor-pointer">G</span>
        <span class="cursor-pointer">f</span>
      </div>

    </div>

  </div>
<script>
  function togglePassword() {
    const input = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if (input.type === "password") {
      input.type = "text";
      icon.src = "https://cdn-icons-png.flaticon.com/128/709/709612.png"; // eye-off
    } else {
      input.type = "password";
      icon.src = "https://cdn-icons-png.flaticon.com/128/8275/8275675.png"; // eye
    }
  }
</script>
 
</body>

</body>
</html>
