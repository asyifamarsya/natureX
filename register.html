<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen w-full bg-[#EFF5D2]">

  <div class="flex items-center justify-between h-screen pl-40 pr-60">
    
    <!-- KIRI -->
    <div>
      <h1 class="text-5xl font-semibold">Register</h1>
    </div>

    <!-- KANAN (FORM) -->
    <div class="w-96">
      
      <!-- Username -->
      <label class="block mb-2 text-sm">Username</label>
      <input type="text" class="w-full p-3 border border-green-600 rounded-md bg-transparent mb-6 outline-none">

      <!-- Gmail -->
      <label class="block mb-2 text-sm">Gmail</label>
      <div class="relative mb-6">
        <input type="email" class="w-full p-3 border border-green-600 rounded-md bg-transparent outline-none">
      </div>

      <!-- Password -->
      <label class="block mb-2 text-sm">Password</label>
      <div class="relative mb-2">
        <input id="password" type="password" class="w-full p-3 border border-green-600 rounded-md bg-transparent outline-none">

        <!-- ICON MATA -->
        <button type="button" onclick="togglePassword()" class="absolute right-3 top-3">
          <img src="https://cdn-icons-png.flaticon.com/128/8275/8275675.png" 
               class="w-5 h-5" 
               id="eyeIcon">
        </button>
      </div>

      <!-- Forgot -->
      <a href="./forgot.html" 
       class=" px-6 py-2 rounded inline-block
          active:scale-95 transition">
          forget password?
        </a>

      <div class="w-96">
        <a href="./homepage.html" 
       class="bg-green-500 px-6 py-2 rounded inline-block
          active:scale-95 transition">
          send
        </a>
        </div>

      <!-- Register -->
      <p class="text-sm text-center">
        don't have an account yet</p>

      <!-- ICON SOSIAL -->
      <div class="flex justify-center gap-6 mt-4 text-lg">
        <span class="cursor-pointer">G</span>
        <span class="cursor-pointer">f</span>
      </div>

    </div>
  </div>

  <!-- SCRIPT TOGGLE PASSWORD -->
  <script>
    function togglePassword() {
      const input = document.getElementById("password");
      const icon = document.getElementById("eyeIcon");

      if (input.type === "password") {
        input.type = "text";
        icon.src = "https://cdn-icons-png.flaticon.com/128/709/709612.png"; // eye off
      } else {
        input.type = "password";
        icon.src = "https://cdn-icons-png.flaticon.com/128/8275/8275675.png"; // eye
      }
    }
  </script>

</body>
</html>
